<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ID照合アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    <style>
        /* 画面全体の固定 */
        body, html { 
            position: fixed; 
            width: 100%; 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            background-color: #000;
        }

        /* ヘッダー・ステータスを最前面に固定 */
        #status-bar { 
            z-index: 100; 
            flex-shrink: 0;
        }

        /* カメラコンテナ（残りの空間をすべて使う） */
        #video-container { 
            position: relative; 
            flex-grow: 1; 
            width: 100%; 
            overflow: hidden; 
            background: #000;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        /* スキャンガイド */
        .scan-guide {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 60px;
            border: 2px solid #3b82f6;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        /* 操作パネルを最前面に固定 */
        .controls {
            z-index: 100;
            background-color: white;
            padding: 1.5rem;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        #loading {
            display: none; position: absolute; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 200;
            align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <!-- ステータス表示（最上部） -->
    <div id="status-bar" class="p-4 text-center text-lg font-black bg-gray-800 text-white">
        システム起動中...
    </div>

    <!-- カメラ映像エリア（中央） -->
    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="scan-guide"></div>
        <div id="loading">
            <div class="text-center">
                <div class="animate-spin h-10 w-10 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-2"></div>
                <p>解析中...</p>
            </div>
        </div>
        <canvas id="capture-canvas" style="display:none;"></canvas>
    </div>

    <!-- 操作パネル（最下部） -->
    <div class="controls">
        <div class="grid grid-cols-2 gap-4 mb-2">
            <div class="bg-gray-100 p-2 rounded border-l-4 border-blue-500">
                <p class="text-[10px] text-gray-500 font-bold">正解(Target)</p>
                <p id="target-id" class="text-lg font-mono text-gray-800">----------</p>
            </div>
            <div class="bg-gray-100 p-2 rounded border-l-4 border-yellow-500">
                <p class="text-[10px] text-gray-500 font-bold">今回(Scan)</p>
                <p id="current-id" class="text-lg font-mono text-gray-800">----------</p>
            </div>
        </div>

        <button id="shutter-btn" onclick="captureAndOCR()" class="w-full py-4 bg-blue-600 text-white rounded-xl text-xl font-bold active:bg-blue-800 shadow-lg">
            スキャン（読み取り）
        </button>
        
        <button onclick="resetApp()" class="text-gray-400 text-xs underline">リセット</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('capture-canvas');
        const statusBar = document.getElementById('status-bar');
        const targetDisplay = document.getElementById('target-id');
        const currentDisplay = document.getElementById('current-id');
        const loading = document.getElementById('loading');
        const shutterBtn = document.getElementById('shutter-btn');

        let targetID = null;
        let worker = null;

        async function init() {
            try {
                statusBar.innerText = "エンジン起動中...";
                worker = await Tesseract.createWorker();
                await worker.loadLanguage('eng');
                await worker.initialize('eng');
                await worker.setParameters({
                    tessedit_char_whitelist: '0123456789',
                    tessedit_pageseg_mode: Tesseract.PSM.SINGLE_LINE,
                });

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                statusBar.innerText = "1枚目をスキャン";
            } catch (err) {
                statusBar.innerText = "エラー: " + err.message;
            }
        }

        async function captureAndOCR() {
            if (!worker) return;
            loading.style.display = 'flex';
            shutterBtn.disabled = true;

            const ctx = canvas.getContext('2d');
            const vW = video.videoWidth;
            const vH = video.videoHeight;

            // カメラ映像の実解像度に基づいたクロップ
            const cropW = vW * 0.8;
            const cropH = vH * 0.15;
            const cropX = (vW - cropW) / 2;
            const cropY = (vH - cropH) / 2;

            canvas.width = cropW * 2;
            canvas.height = cropH * 2;
            ctx.filter = 'grayscale(1) contrast(3) brightness(1.1)';
            ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, canvas.width, canvas.height);

            try {
                const { data: { text } } = await worker.recognize(canvas);
                const digits = text.replace(/[^0-9]/g, '');
                const match = digits.match(/\d{10}/);

                if (match) {
                    processResult(match[0]);
                } else {
                    alert("10桁の数字が読み取れませんでした。もう少し離して、数字を枠の中央に入れてください。");
                }
            } catch (e) {
                console.error(e);
            }

            loading.style.display = 'none';
            shutterBtn.disabled = false;
        }

        function processResult(id) {
            currentDisplay.innerText = id;
            if (!targetID) {
                targetID = id;
                targetDisplay.innerText = id;
                statusBar.innerText = "正解を登録完了";
                statusBar.style.backgroundColor = "#2563eb";
            } else {
                if (id === targetID) {
                    statusBar.innerText = "一致 (OK)";
                    statusBar.style.backgroundColor = "#059669";
                } else {
                    statusBar.innerText = "不一致 (NG)";
                    statusBar.style.backgroundColor = "#dc2626";
                }
            }
        }

        function resetApp() {
            targetID = null;
            targetDisplay.innerText = "----------";
            currentDisplay.innerText = "----------";
            statusBar.innerText = "1枚目をスキャン";
            statusBar.style.backgroundColor = "#1f2937";
        }

        window.onload = init;
    </script>
</body>
</html>
