<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ID照合（プレビュー修正版）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { position: fixed; width: 100%; height: 100%; margin: 0; display: flex; flex-direction: column; background-color: #111; overflow: hidden; }
        #video-container { position: relative; width: 100%; height: 45vh; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .scan-guide {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 80px;
            border: 3px solid #3b82f6;
            z-index: 10;
            background: rgba(59, 130, 246, 0.1);
            pointer-events: none;
        }
        #loading-overlay {
            display: none; position: absolute; inset: 0;
            z-index: 200; align-items: center; justify-content: center; color: white;
            background: rgba(0,0,0,0.85); flex-direction: column;
        }
        .msg-box { padding: 30px 60px; border-radius: 20px; font-weight: 900; font-size: 48px; border: 4px solid white; }
        /* プレビューエリアを明示的に確保 */
        #debug-container { width: 90%; height: 80px; background: #333; display: flex; align-items: center; justify-content: center; border: 2px solid #555; overflow: hidden; }
        #debug-preview { max-width: 100%; max-height: 100%; display: block; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="status-bar" class="p-4 text-center text-xl font-black bg-gray-800 text-white">
        1枚目をスキャン
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div id="loading-overlay">
            <div id="loading-content">
                <div class="animate-spin h-12 w-12 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p>解析中...</p>
            </div>
            <div id="result-content" style="display:none;" class="text-center">
                <div id="msg-card" class="msg-box mb-4"></div>
                <p>画面をタップして次へ</p>
            </div>
        </div>
        <div class="scan-guide"></div>
        <canvas id="capture-canvas" style="display:none;"></canvas>
    </div>

    <div class="flex-grow p-4 bg-white flex flex-col items-center">
        <p class="text-[10px] text-gray-500 font-bold mb-1">OCR SENDING IMAGE</p>
        <div id="debug-container">
            <img id="debug-preview" src="" alt="PREVIEW">
        </div>

        <div class="grid grid-cols-2 gap-4 w-full my-4">
            <div class="bg-blue-50 p-2 rounded border-l-4 border-blue-500">
                <p class="text-[10px] text-blue-600 font-bold">正解 ID</p>
                <p id="target-id" class="text-lg font-mono text-gray-800">----------</p>
            </div>
            <div class="bg-yellow-50 p-2 rounded border-l-4 border-yellow-500">
                <p class="text-[10px] text-yellow-600 font-bold">今回検知</p>
                <p id="current-id" class="text-lg font-mono text-gray-800">----------</p>
            </div>
        </div>

        <button id="shutter-btn" onclick="performScan()" class="w-full py-5 bg-blue-600 text-white rounded-2xl text-2xl font-bold shadow-xl active:bg-blue-800">
            スキャン実行
        </button>
        
        <button onclick="resetApp()" class="mt-2 text-gray-400 text-xs underline">リセット</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxQCTxmn41UR3GhNLi7xqYmR6cNX-X1KaNNrcuhHX98wvrvkfe_Rn36yvv4r82cHgjz/exec";

        const video = document.getElementById('video');
        const canvas = document.getElementById('capture-canvas');
        const statusBar = document.getElementById('status-bar');
        const targetDisplay = document.getElementById('target-id');
        const currentDisplay = document.getElementById('current-id');
        const overlay = document.getElementById('loading-overlay');
        const loadingContent = document.getElementById('loading-content');
        const resultContent = document.getElementById('result-content');
        const msgCard = document.getElementById('msg-card');
        const shutterBtn = document.getElementById('shutter-btn');
        const debugPreview = document.getElementById('debug-preview');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 } }
                });
                video.srcObject = stream;
            } catch (err) {
                alert("カメラを起動できません");
            }
        }

        async function performScan() {
            if (!GAS_URL.startsWith("https")) { alert("GASのURLを設定してください"); return; }

            shutterBtn.disabled = true;

            const ctx = canvas.getContext('2d');
            const vW = video.videoWidth;
            const vH = video.videoHeight;
            const dW = video.offsetWidth;
            const dH = video.offsetHeight;

            // 比率に基づいた正確なクロップ
            const cropW = vW * 0.8; 
            const cropH = (80 / dH) * vH; 
            const cropX = (vW - cropW) / 2;
            const cropY = (vH - cropH) / 2;

            canvas.width = cropW;
            canvas.height = cropH;
            
            // Canvasに描画
            ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

            // 【プレビュー表示の確実化】
            const imageData = canvas.toDataURL('image/jpeg', 0.8);
            debugPreview.src = imageData; // ここで画像URLをセット

            // オーバーレイ表示
            overlay.style.display = 'flex';
            loadingContent.style.display = 'block';
            resultContent.style.display = 'none';

            const base64Image = imageData.split(',')[1];

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ image: base64Image, targetID: (targetDisplay.innerText.includes('-') ? "" : targetDisplay.innerText) })
                });
                const data = await response.json();

                if (data.scannedID && data.scannedID !== "検出不可") {
                    handleResult(data.scannedID, data.status);
                    showResult(data.status);
                } else {
                    alert("枠内に数字が見つかりませんでした。");
                    closeOverlay();
                }
            } catch (err) {
                alert("通信エラー");
                closeOverlay();
            }
        }

        function showResult(status) {
            loadingContent.style.display = 'none';
            resultContent.style.display = 'block';
            if (status === "初回登録") { msgCard.innerText = "登録完了"; msgCard.className = "msg-box bg-blue-600"; }
            else if (status === "一致") { msgCard.innerText = "OK"; msgCard.className = "msg-box bg-green-600"; }
            else { msgCard.innerText = "NG"; msgCard.className = "msg-box bg-red-600"; }
            overlay.onclick = closeOverlay;
        }

        function closeOverlay() { overlay.style.display = 'none'; shutterBtn.disabled = false; }

        function handleResult(id, status) {
            currentDisplay.innerText = id;
            if (status === "初回登録") {
                targetDisplay.innerText = id;
                statusBar.className = "p-4 text-center text-xl font-black bg-blue-600 text-white";
                statusBar.innerText = "登録完了: " + id;
            } else {
                if (status === "一致") {
                    statusBar.className = "p-4 text-center text-xl font-black bg-green-600 text-white";
                    statusBar.innerText = "一致 (OK)";
                } else {
                    statusBar.className = "p-4 text-center text-xl font-black bg-red-600 text-white";
                    statusBar.innerText = "不一致 (NG)";
                }
            }
        }

        function resetApp() {
            targetDisplay.innerText = "----------";
            currentDisplay.innerText = "----------";
            statusBar.innerText = "1枚目をスキャン";
            statusBar.className = "p-4 text-center text-xl font-black bg-gray-800 text-white";
            debugPreview.src = ""; // プレビューもリセット
            closeOverlay();
        }

        window.onload = initCamera;
    </script>
</body>
</html>
