<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>高速ID照合システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { position: fixed; width: 100%; height: 100%; margin: 0; display: flex; flex-direction: column; background-color: #000; overflow: hidden; }
        #video-container { position: relative; flex-grow: 1; width: 100%; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* 読み取り枠 */
        .scan-guide {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 100px;
            border: 3px solid #3b82f6;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        #shutter-flash { display: none; position: absolute; inset: 0; background: white; z-index: 60; }

        #wait-overlay {
            display: none; position: absolute; inset: 0;
            z-index: 50; align-items: center; justify-content: center; color: white; text-align: center;
        }
        .msg-box { padding: 30px 60px; border-radius: 20px; font-weight: 900; font-size: 48px; border: 4px solid white; }

        #scan-timer {
            position: absolute; bottom: 0; left: 0; height: 6px;
            background: #3b82f6; width: 0%; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="status-bar" class="p-4 text-center text-xl font-black bg-gray-800 text-white">
        1枚目をスキャン
    </div>

    <div id="video-container">
        <div id="shutter-flash"></div>
        <div id="scan-timer"></div>
        <video id="video" autoplay playsinline></video>
        <div id="wait-overlay"><div id="msg-card" class="msg-box"></div></div>
        <div class="scan-guide"></div>
        <!-- 内部処理用Canvas（表示はしない） -->
        <canvas id="capture-canvas" style="display:none;"></canvas>
    </div>

    <div class="p-4 bg-white flex flex-col items-center">
        <div class="flex justify-around w-full mb-2">
            <div class="text-left">
                <p class="text-[10px] text-gray-400 font-bold uppercase">正解 ID</p>
                <p id="target-id" class="text-2xl font-mono text-blue-600">----------</p>
            </div>
            <div class="text-left border-l pl-4">
                <p class="text-[10px] text-gray-400 font-bold uppercase">今回検知</p>
                <p id="current-id" class="text-xl font-mono text-gray-800">----------</p>
            </div>
        </div>
        <div id="loading-msg" class="text-xs text-blue-500 font-bold h-4 mb-2"></div>
        <button onclick="resetApp()" class="text-gray-500 text-sm border border-gray-300 px-6 py-1 rounded-full">リセット</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxQCTxmn41UR3GhNLi7xqYmR6cNX-X1KaNNrcuhHX98wvrvkfe_Rn36yvv4r82cHgjz/exec";

        const video = document.getElementById('video');
        const canvas = document.getElementById('capture-canvas');
        const statusBar = document.getElementById('status-bar');
        const targetDisplay = document.getElementById('target-id');
        const currentDisplay = document.getElementById('current-id');
        const waitOverlay = document.getElementById('wait-overlay');
        const msgCard = document.getElementById('msg-card');
        const flash = document.getElementById('shutter-flash');
        const timerBar = document.getElementById('scan-timer');
        const loadingMsg = document.getElementById('loading-msg');

        let targetID = null;
        let isWaiting = false;

        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1280 } }
            });
            video.srcObject = stream;
            startAutoLoop();
        }

        async function startAutoLoop() {
            if (!isWaiting) {
                timerBar.style.transition = "width 2s linear";
                timerBar.style.width = "100%";
                await new Promise(r => setTimeout(r, 2000));
                if (!isWaiting) await performScan();
                timerBar.style.transition = "none";
                timerBar.style.width = "0%";
            }
            setTimeout(startAutoLoop, 500);
        }

        async function performScan() {
            flash.style.display = 'block';
            setTimeout(() => { flash.style.display = 'none'; }, 100);
            loadingMsg.innerText = "高速解析中...";

            const ctx = canvas.getContext('2d');
            
            // 映像の実際の解像度
            const vW = video.videoWidth;
            const vH = video.videoHeight;

            // ★クロップ（枠の部分だけ切り抜く）の計算
            // 画面上の枠の比率に合わせる（横80%、高さ100px相当）
            const cropW = vW * 0.8;
            const cropH = vH * 0.2; // 高めに設定して文字切れを防止
            const cropX = (vW - cropW) / 2;
            const cropY = (vH - cropH) / 2;

            canvas.width = cropW;
            canvas.height = cropH;

            // 枠内だけをCanvasに描画
            ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

            const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ image: base64Image, targetID: targetID || "" })
                });
                const data = await response.json();

                if (data.scannedID && data.scannedID !== "検出不可") {
                    handleResult(data.scannedID, data.status);
                    await triggerWait(data.status);
                }
            } catch (err) {
                console.error(err);
            } finally {
                loadingMsg.innerText = "";
            }
        }

        async function triggerWait(status) {
            isWaiting = true;
            if (status === "初回登録") {
                msgCard.innerText = "登録完了";
                waitOverlay.style.backgroundColor = "rgba(37, 99, 235, 0.9)";
            } else if (status === "一致") {
                msgCard.innerText = "OK";
                waitOverlay.style.backgroundColor = "rgba(22, 163, 74, 0.9)";
            } else {
                msgCard.innerText = "NG";
                waitOverlay.style.backgroundColor = "rgba(220, 38, 38, 0.9)";
            }
            waitOverlay.style.display = 'flex';
            await new Promise(r => setTimeout(r, 2000)); // 待ち時間を少し短縮（2秒）
            waitOverlay.style.display = 'none';
            isWaiting = false;
        }

        function handleResult(id, status) {
            currentDisplay.innerText = id;
            if (!targetID) {
                targetID = id;
                targetDisplay.innerText = id;
                statusBar.className = "p-4 text-center text-xl font-black bg-blue-600 text-white";
                statusBar.innerText = "登録完了: " + id;
            } else {
                if (status === "一致") {
                    statusBar.className = "p-4 text-center text-xl font-black bg-green-600 text-white";
                    statusBar.innerText = "一致 (OK)";
                } else {
                    statusBar.className = "p-4 text-center text-xl font-black bg-red-600 text-white";
                    statusBar.innerText = "不一致 (NG)";
                }
            }
        }

        function resetApp() {
            targetID = null;
            targetDisplay.innerText = "----------";
            currentDisplay.innerText = "----------";
            statusBar.innerText = "1枚目をスキャン";
            statusBar.className = "p-4 text-center text-xl font-black bg-gray-800 text-white";
            waitOverlay.style.display = 'none';
            isWaiting = false;
        }

        window.onload = initCamera;
    </script>
</body>
</html>
