<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全自動ID照合システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { position: fixed; width: 100%; height: 100%; margin: 0; display: flex; flex-direction: column; background-color: #000; overflow: hidden; }
        #status-bar { z-index: 100; flex-shrink: 0; }
        #video-container { position: relative; flex-grow: 1; width: 100%; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        /* 枠を広めにして「大まか」でも入るように調整 */
        .scan-guide {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; height: 120px;
            border: 2px dashed #3b82f6;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }
        .controls { z-index: 100; background-color: white; padding: 1rem; flex-shrink: 0; text-align: center; }
        .loading-dot { display: inline-block; width: 10px; height: 10px; background: #3b82f6; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="status-bar" class="p-4 text-center text-xl font-black bg-blue-900 text-white">
        自動スキャン待機中...
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="scan-guide"></div>
        <canvas id="capture-canvas" style="display:none;"></canvas>
    </div>

    <div class="controls">
        <div class="flex justify-around mb-2">
            <div class="text-left">
                <p class="text-[10px] text-gray-400 font-bold">正解ID</p>
                <p id="target-id" class="text-xl font-mono text-blue-600">----------</p>
            </div>
            <div class="text-left">
                <p class="text-[10px] text-gray-400 font-bold">最終検知</p>
                <p id="current-id" class="text-xl font-mono text-gray-800">----------</p>
            </div>
        </div>
        
        <div id="scan-indicator" class="text-sm text-gray-500 font-bold">
            <span class="loading-dot"></span> 自動解析ループ動作中...
        </div>

        <button onclick="resetApp()" class="mt-2 text-gray-400 text-xs underline">正解IDをリセット</button>
    </div>

    <script>
        // ★★★ GASのURLを貼り付けてください ★★★
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxQCTxmn41UR3GhNLi7xqYmR6cNX-X1KaNNrcuhHX98wvrvkfe_Rn36yvv4r82cHgjz/exec";

        const video = document.getElementById('video');
        const canvas = document.getElementById('capture-canvas');
        const statusBar = document.getElementById('status-bar');
        const targetDisplay = document.getElementById('target-id');
        const currentDisplay = document.getElementById('current-id');

        let targetID = null;
        let lastScannedID = "";
        let isProcessing = false;

        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1280 } }
            });
            video.srcObject = stream;
            // 起動から3秒後に自動スキャンのループを開始
            setTimeout(autoScanLoop, 3000);
        }

        // 全自動ループ関数
        async function autoScanLoop() {
            if (!isProcessing) {
                await performScan();
            }
            // 2.5秒おきに次の解析を行う（サーバー負荷と精度のバランス）
            setTimeout(autoScanLoop, 2500);
        }

        async function performScan() {
            isProcessing = true;
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            const base64Image = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ image: base64Image, targetID: targetID || "" })
                });
                const data = await response.json();

                if (data.scannedID && data.scannedID !== "検出不可") {
                    // 同じ番号を連続で認識した場合は無視（ログ汚れ防止）
                    if (data.scannedID !== lastScannedID) {
                        handleResult(data.scannedID, data.status);
                        lastScannedID = data.scannedID;
                    }
                }
            } catch (err) {
                console.error("通信エラー:", err);
            } finally {
                isProcessing = false;
            }
        }

        function handleResult(id, status) {
            currentDisplay.innerText = id;

            if (!targetID) {
                targetID = id;
                targetDisplay.innerText = id;
                speak("正解を登録しました");
                statusBar.innerText = "登録完了: " + id;
                statusBar.className = "p-4 text-center text-xl font-black bg-blue-600 text-white";
            } else {
                if (status === "一致") {
                    speak("一致");
                    statusBar.innerText = "一致 (OK)";
                    statusBar.className = "p-4 text-center text-xl font-black bg-green-600 text-white";
                } else {
                    speak("不一致");
                    statusBar.innerText = "不一致 (NG)";
                    statusBar.className = "p-4 text-center text-xl font-black bg-red-600 text-white";
                }
            }
        }

        // 音声読み上げ機能
        function speak(text) {
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            window.speechSynthesis.speak(uttr);
        }

        function resetApp() {
            targetID = null;
            lastScannedID = "";
            targetDisplay.innerText = "----------";
            currentDisplay.innerText = "----------";
            statusBar.innerText = "1枚目をスキャン";
            statusBar.className = "p-4 text-center text-xl font-black bg-gray-800 text-white";
            speak("リセットしました");
        }

        window.onload = initCamera;
    </script>
</body>
</html>
