<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ID照合（枠内限定スキャン）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { position: fixed; width: 100%; height: 100%; margin: 0; display: flex; flex-direction: column; background-color: #000; overflow: hidden; }
        #status-bar { z-index: 100; flex-shrink: 0; }
        #video-container { position: relative; flex-grow: 1; width: 100%; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* 青い枠（この中だけを切り取ります） */
        .scan-guide {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 120px;
            border: 3px solid #3b82f6;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.6);
            z-index: 10;
        }
        #loading-overlay {
            display: none; position: absolute; inset: 0;
            z-index: 200; align-items: center; justify-content: center; color: white;
            background: rgba(0,0,0,0.85); flex-direction: column;
        }
        .msg-box { padding: 30px 60px; border-radius: 20px; font-weight: 900; font-size: 48px; border: 4px solid white; }
    </style>
</head>
<body>

    <div id="status-bar" class="p-4 text-center text-xl font-black bg-gray-800 text-white">
        1枚目をスキャン
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div id="loading-overlay">
            <div id="loading-content">
                <div class="animate-spin h-12 w-12 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p>枠内のIDを解析中...</p>
            </div>
            <div id="result-content" style="display:none;" class="text-center">
                <div id="msg-card" class="msg-box mb-4"></div>
                <p>画面をタップして次へ</p>
            </div>
        </div>
        <div class="scan-guide" id="guide-box"></div>
        <canvas id="capture-canvas" style="display:none;"></canvas>
    </div>

    <div class="p-4 bg-white flex flex-col items-center">
        <!-- 切り取られた画像を確認するためのデバッグ用 -->
        <p class="text-[8px] text-gray-400 font-bold uppercase mb-1">OCR送信画像（枠内のみ）</p>
        <img id="debug-preview" class="h-16 border-2 border-blue-200 mb-2">

        <div class="flex justify-around w-full mb-4">
            <div class="text-left">
                <p class="text-[10px] text-gray-400 font-bold uppercase">正解 ID</p>
                <p id="target-id" class="text-2xl font-mono text-blue-600">----------</p>
            </div>
            <div class="text-left border-l pl-4">
                <p class="text-[10px] text-gray-400 font-bold uppercase">今回検知</p>
                <p id="current-id" class="text-2xl font-mono text-gray-800">----------</p>
            </div>
        </div>

        <button id="shutter-btn" onclick="performScan()" class="w-full py-5 bg-blue-600 text-white rounded-2xl text-2xl font-bold shadow-xl active:bg-blue-800">
            スキャン実行
        </button>
        
        <button onclick="resetApp()" class="mt-4 text-gray-400 text-xs underline">リセット</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxQCTxmn41UR3GhNLi7xqYmR6cNX-X1KaNNrcuhHX98wvrvkfe_Rn36yvv4r82cHgjz/exec";

        const video = document.getElementById('video');
        const canvas = document.getElementById('capture-canvas');
        const statusBar = document.getElementById('status-bar');
        const targetDisplay = document.getElementById('target-id');
        const currentDisplay = document.getElementById('current-id');
        const overlay = document.getElementById('loading-overlay');
        const loadingContent = document.getElementById('loading-content');
        const resultContent = document.getElementById('result-content');
        const msgCard = document.getElementById('msg-card');
        const shutterBtn = document.getElementById('shutter-btn');
        const debugPreview = document.getElementById('debug-preview');

        let targetID = null;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 } }
                });
                video.srcObject = stream;
            } catch (err) {
                alert("カメラを起動できません");
            }
        }

        async function performScan() {
            if (!GAS_URL.startsWith("https")) { alert("GASのURLを設定してください"); return; }

            shutterBtn.disabled = true;
            overlay.style.display = 'flex';
            loadingContent.style.display = 'block';
            resultContent.style.display = 'none';

            const ctx = canvas.getContext('2d');
            
            // 映像の実際の解像度
            const vW = video.videoWidth;
            const vH = video.videoHeight;
            // 画面上の表示サイズ
            const dW = video.clientWidth;
            const dH = video.clientHeight;

            // 画面上の枠のサイズ（80%幅、120px高）
            const guideW = dW * 0.8;
            const guideH = 120;

            // 画面上のサイズから、カメラ映像の解像度上の座標へ変換する比率
            const scaleX = vW / dW;
            const scaleY = vH / dH;

            // カメラ映像上の切り取り範囲を計算
            const cropW = guideW * scaleX;
            const cropH = guideH * scaleY;
            const cropX = (vW - cropW) / 2;
            const cropY = (vH - cropH) / 2;

            canvas.width = cropW;
            canvas.height = cropH;
            
            // 枠内だけを正確に切り取って描画
            ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

            // デバッグ表示用のプレビュー（ここが正しく切り取られていればOK）
            debugPreview.src = canvas.toDataURL('image/jpeg');

            const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ image: base64Image, targetID: targetID || "" })
                });
                const data = await response.json();

                if (data.scannedID && data.scannedID !== "検出不可") {
                    handleResult(data.scannedID, data.status);
                    showResult(data.status);
                } else {
                    alert("枠内に数字が見つかりませんでした。枠に数字が重なるように調整してください。");
                    closeOverlay();
                }
            } catch (err) {
                alert("通信エラー");
                closeOverlay();
            }
        }

        function showResult(status) {
            loadingContent.style.display = 'none';
            resultContent.style.display = 'block';
            if (status === "初回登録") { msgCard.innerText = "登録完了"; msgCard.className = "msg-box bg-blue-600"; }
            else if (status === "一致") { msgCard.innerText = "OK"; msgCard.className = "msg-box bg-green-600"; }
            else { msgCard.innerText = "NG"; msgCard.className = "msg-box bg-red-600"; }
            overlay.onclick = closeOverlay;
        }

        function closeOverlay() {
            overlay.style.display = 'none';
            shutterBtn.disabled = false;
        }

        function handleResult(id, status) {
            currentDisplay.innerText = id;
            if (!targetID) {
                targetID = id;
                targetDisplay.innerText = id;
                statusBar.className = "p-4 text-center text-xl font-black bg-blue-600 text-white";
                statusBar.innerText = "登録完了: " + id;
            } else {
                if (status === "一致") {
                    statusBar.className = "p-4 text-center text-xl font-black bg-green-600 text-white";
                    statusBar.innerText = "一致 (OK)";
                } else {
                    statusBar.className = "p-4 text-center text-xl font-black bg-red-600 text-white";
                    statusBar.innerText = "不一致 (NG)";
                }
            }
        }

        function resetApp() {
            targetID = null;
            targetDisplay.innerText = "----------";
            currentDisplay.innerText = "----------";
            statusBar.innerText = "1枚目をスキャン";
            statusBar.className = "p-4 text-center text-xl font-black bg-gray-800 text-white";
            closeOverlay();
        }

        window.onload = initCamera;
    </script>
</body>
</html>
