<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ID照合アプリ v3 - 高精度OCR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    <style>
        body, html { 
            position: fixed; 
            width: 100%; 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            background-color: #000;
        }

        #status-bar { 
            z-index: 100; 
            flex-shrink: 0;
            transition: background-color 0.3s ease;
        }

        #video-container { 
            position: relative; 
            flex-grow: 1; 
            width: 100%; 
            overflow: hidden; 
            background: #000;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        .scan-guide {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 60px;
            border: 3px solid #3b82f6;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.5);
            z-index: 10;
            border-radius: 8px;
        }

        .controls {
            z-index: 100;
            background-color: white;
            padding: 1.5rem;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 40vh;
            overflow-y: auto;
        }

        #loading {
            display: none; position: absolute; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 200;
            align-items: center; justify-content: center; color: white;
            flex-direction: column;
        }

        .confidence-bar {
            height: 6px;
            background-color: #e5e7eb;
            border-radius: 3px;
            margin-top: 4px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background-color: #3b82f6;
            transition: width 0.3s ease;
        }

        .confidence-fill.low {
            background-color: #ef4444;
        }

        .confidence-fill.medium {
            background-color: #f59e0b;
        }

        .confidence-fill.high {
            background-color: #10b981;
        }

        .log-entry {
            font-size: 11px;
            padding: 8px;
            border-left: 3px solid #d1d5db;
            background-color: #f9fafb;
            border-radius: 4px;
            margin: 4px 0;
            font-family: monospace;
        }

        .log-entry.match {
            border-left-color: #10b981;
            background-color: #ecfdf5;
        }

        .log-entry.mismatch {
            border-left-color: #ef4444;
            background-color: #fef2f2;
        }

        .log-entry.register {
            border-left-color: #3b82f6;
            background-color: #eff6ff;
        }

        .sound-toggle {
            font-size: 12px;
            padding: 6px 12px;
            background-color: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            cursor: pointer;
        }

        .sound-toggle.active {
            background-color: #dbeafe;
            border-color: #3b82f6;
        }

        .debug-panel {
            background-color: #1f2937;
            color: #d1d5db;
            padding: 8px;
            border-radius: 4px;
            font-size: 10px;
            font-family: monospace;
            line-height: 1.4;
        }

        .debug-item {
            margin: 2px 0;
        }

        .debug-label {
            color: #9ca3af;
            font-weight: bold;
        }

        .retry-warning {
            background-color: #fef3c7;
            border-left: 3px solid #f59e0b;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            color: #92400e;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <!-- ステータス表示（最上部） -->
    <div id="status-bar" class="p-4 text-center text-lg font-black bg-gray-800 text-white">
        システム起動中...
    </div>

    <!-- カメラ映像エリア（中央） -->
    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="scan-guide"></div>
        <div id="loading">
            <div class="animate-spin h-10 w-10 border-4 border-blue-500 border-t-transparent rounded-full mb-2"></div>
            <p id="loading-text">解析中...</p>
        </div>
        <canvas id="capture-canvas" style="display:none;"></canvas>
        <canvas id="debug-canvas" style="display:none;"></canvas>
    </div>

    <!-- 操作パネル（最下部） -->
    <div class="controls">
        <!-- 音声トグル -->
        <div class="flex gap-2 items-center justify-between">
            <span class="text-xs text-gray-600 font-bold">音声フィードバック</span>
            <button id="sound-toggle" class="sound-toggle active" onclick="toggleSound()">🔊 ON</button>
        </div>

        <!-- 低精度警告 -->
        <div id="retry-warning" style="display:none;" class="retry-warning">
            ⚠️ 読み取り精度が低めです。位置・角度・照明を調整して再試行してください
        </div>

        <!-- 正解・現在ID表示 -->
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-gray-100 p-3 rounded border-l-4 border-blue-500">
                <p class="text-[10px] text-gray-500 font-bold">正解(Target)</p>
                <p id="target-id" class="text-lg font-mono text-gray-800 tracking-widest">----------</p>
                <p id="target-confidence" class="text-[9px] text-gray-500 mt-1">信度: --</p>
            </div>
            <div class="bg-gray-100 p-3 rounded border-l-4 border-yellow-500">
                <p class="text-[10px] text-gray-500 font-bold">今回(Scan)</p>
                <p id="current-id" class="text-lg font-mono text-gray-800 tracking-widest">----------</p>
                <div class="confidence-bar">
                    <div id="confidence-fill" class="confidence-fill" style="width: 0%"></div>
                </div>
                <p id="current-confidence" class="text-[9px] text-gray-500 mt-1">信度: --</p>
            </div>
        </div>

        <!-- スキャンボタン -->
        <button id="shutter-btn" onclick="captureAndOCR()" class="w-full py-4 bg-blue-600 text-white rounded-xl text-xl font-bold active:bg-blue-800 shadow-lg hover:bg-blue-700 transition">
            スキャン（読み取り）
        </button>

        <!-- デバッグ情報パネル -->
        <div class="debug-panel">
            <div class="debug-item"><span class="debug-label">最終認識:</span> <span id="debug-raw">---</span></div>
            <div class="debug-item"><span class="debug-label">抽出数字:</span> <span id="debug-digits">---</span></div>
            <div class="debug-item"><span class="debug-label">マッチ:</span> <span id="debug-match">---</span></div>
        </div>

        <!-- ログパネル -->
        <div class="border-t pt-2">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs text-gray-600 font-bold">スキャン履歴</span>
                <button onclick="downloadLog()" class="text-[10px] text-blue-600 underline hover:text-blue-800">CSV DL</button>
            </div>
            <div id="log-list" style="max-height: 100px; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 4px; padding: 4px; background-color: #fafafa;">
                <p class="text-[11px] text-gray-400">スキャン履歴がここに表示されます</p>
            </div>
        </div>

        <!-- リセットボタン -->
        <button onclick="resetApp()" class="text-gray-400 text-xs underline hover:text-gray-600 transition">リセット・新規患者</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('capture-canvas');
        const debugCanvas = document.getElementById('debug-canvas');
        const statusBar = document.getElementById('status-bar');
        const targetDisplay = document.getElementById('target-id');
        const targetConfidence = document.getElementById('target-confidence');
        const currentDisplay = document.getElementById('current-id');
        const currentConfidence = document.getElementById('current-confidence');
        const confidenceFill = document.getElementById('confidence-fill');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        const shutterBtn = document.getElementById('shutter-btn');
        const logList = document.getElementById('log-list');
        const soundToggle = document.getElementById('sound-toggle');
        const retryWarning = document.getElementById('retry-warning');

        // デバッグ表示
        const debugRaw = document.getElementById('debug-raw');
        const debugDigits = document.getElementById('debug-digits');
        const debugMatch = document.getElementById('debug-match');

        let targetID = null;
        let targetConf = 0;
        let worker = null;
        let soundEnabled = true;
        let scanLog = [];

        async function init() {
            try {
                statusBar.innerText = "エンジン起動中...";
                worker = await Tesseract.createWorker();
                await worker.loadLanguage('eng');
                await worker.initialize('eng');
                await worker.setParameters({
                    tessedit_char_whitelist: '0123456789',
                    tessedit_pageseg_mode: Tesseract.PSM.SINGLE_LINE,
                });

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }
                });
                video.srcObject = stream;
                statusBar.innerText = "1枚目をスキャン";
                statusBar.style.backgroundColor = "#1f2937";
            } catch (err) {
                statusBar.innerText = "エラー: " + err.message;
                statusBar.style.backgroundColor = "#dc2626";
                shutterBtn.disabled = true;
            }
        }

        async function captureAndOCR() {
            if (!worker) return;
            loading.style.display = 'flex';
            loadingText.innerText = '解析中...';
            shutterBtn.disabled = true;

            const ctx = canvas.getContext('2d');
            const vW = video.videoWidth;
            const vH = video.videoHeight;

            // 高品質キャプチャ：3倍に拡大してから処理
            const cropW = vW * 0.8;
            const cropH = vH * 0.15;
            const cropX = (vW - cropW) / 2;
            const cropY = (vH - cropH) / 2;

            canvas.width = cropW * 3;
            canvas.height = cropH * 3;

            // 元画像を大きく描画
            ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, canvas.width, canvas.height);

            // ========== 画像処理パイプライン ==========
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            // ① グレースケール化 + コントラスト強化 + 二値化
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                // グレースケール（標準加重）
                let gray = 0.299 * r + 0.587 * g + 0.114 * b;

                // ② ガンマ補正で中間調を活かす
                gray = Math.pow(gray / 255, 0.6) * 255;

                // ③ 適応的二値化（大津の方法で最適しきい値を自動計算）
                const threshold = calculateOtsuThreshold(data);
                gray = gray > threshold ? 255 : 0;

                data[i] = data[i + 1] = data[i + 2] = gray;
            }

            // ④ ノイズ除去（モルフォロジー処理：膨張→収縮）
            morphologyFilter(data, canvas.width, canvas.height);

            ctx.putImageData(imageData, 0, 0);

            try {
                loadingText.innerText = '認識中...';

                const result = await worker.recognize(canvas);
                const text = result.data.text;
                const confidence = result.data.confidence || 0;

                // デバッグ情報を記録
                debugRaw.innerText = JSON.stringify(text.slice(0, 50));

                console.log('=== OCR 結果 ===');
                console.log('Raw Text:', text);
                console.log('Confidence:', confidence);

                // 10桁のみを抽出
                const digits = text.replace(/[^0-9]/g, '');
                debugDigits.innerText = digits || 'なし';

                const match = digits.match(/\d{10}/);
                debugMatch.innerText = match ? match[0] : 'なし';

                if (match && confidence > 50) {
                    processResult(match[0], confidence);
                } else {
                    const reason = !match ? '10桁の数字が見つかりません' : `信度が低い (${Math.round(confidence)}%)`;
                    alert(`読み取り失敗\n\n認識結果: ${digits || 'なし'}\n信度: ${Math.round(confidence)}%\n理由: ${reason}\n\n対策:\n1. 数字を枠の中央に配置\n2. 書類を正面に向ける\n3. より明るい環境で試す\n4. 書類のピントを確認`);
                }
            } catch (e) {
                console.error(e);
                alert('OCR処理でエラーが発生しました: ' + e.message);
            }

            loading.style.display = 'none';
            shutterBtn.disabled = false;
        }

        // 大津の二値化：最適しきい値を自動計算
        function calculateOtsuThreshold(data) {
            const histogram = new Array(256).fill(0);
            
            for (let i = 0; i < data.length; i += 4) {
                const gray = Math.round(data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114);
                histogram[gray]++;
            }

            const total = data.length / 4;
            let sum = 0;
            for (let i = 0; i < 256; i++) {
                sum += i * histogram[i];
            }

            let sumB = 0;
            let wB = 0;
            let maxVariance = 0;
            let threshold = 0;

            for (let i = 0; i < 256; i++) {
                wB += histogram[i];
                if (wB === 0) continue;

                const wF = total - wB;
                if (wF === 0) break;

                sumB += i * histogram[i];
                const meanB = sumB / wB;
                const meanF = (sum - sumB) / wF;

                const variance = wB * wF * Math.pow(meanB - meanF, 2);

                if (variance > maxVariance) {
                    maxVariance = variance;
                    threshold = i;
                }
            }

            return threshold;
        }

        // モルフォロジー処理（ノイズ除去）
        function morphologyFilter(data, width, height) {
            const kernel = [[0, 1, 0], [1, 1, 1], [0, 1, 0]]; // 十字カーネル
            const temp = new Uint8ClampedArray(data);

            for (let i = 0; i < temp.length; i += 4) {
                const pixelIndex = i / 4;
                const y = Math.floor(pixelIndex / width);
                const x = pixelIndex % width;

                let isWhite = true;
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (kernel[dy + 1][dx + 1] === 0) continue;
                        const ny = y + dy;
                        const nx = x + dx;
                        if (ny < 0 || ny >= height || nx < 0 || nx >= width) continue;
                        const neighborIdx = (ny * width + nx) * 4;
                        if (temp[neighborIdx] < 128) {
                            isWhite = false;
                            break;
                        }
                    }
                    if (!isWhite) break;
                }

                const value = isWhite ? 255 : 0;
                data[i] = data[i + 1] = data[i + 2] = value;
            }
        }

        function processResult(id, confidence) {
            currentDisplay.innerText = id;
            const conf = Math.round(confidence);
            currentConfidence.innerText = `信度: ${conf}%`;

            // 信度レベルで色分け
            confidenceFill.className = 'confidence-fill';
            if (conf < 70) {
                confidenceFill.classList.add('low');
                retryWarning.style.display = 'block';
            } else if (conf < 85) {
                confidenceFill.classList.add('medium');
                retryWarning.style.display = 'none';
            } else {
                confidenceFill.classList.add('high');
                retryWarning.style.display = 'none';
            }
            confidenceFill.style.width = conf + '%';

            const timestamp = new Date().toLocaleTimeString('ja-JP');

            if (!targetID) {
                targetID = id;
                targetConf = conf;
                targetDisplay.innerText = id;
                targetConfidence.innerText = `信度: ${conf}%`;
                statusBar.innerText = "✓ 正解を登録完了";
                statusBar.style.backgroundColor = "#2563eb";
                playSound('register');
                addLog(`【正解登録】${id} (信度: ${conf}%)`, 'register', timestamp);
            } else {
                const isMatch = id === targetID;
                if (isMatch) {
                    statusBar.innerText = "✓✓ 一致 (OK)";
                    statusBar.style.backgroundColor = "#059669";
                    playSound('match');
                    addLog(`✓ ${id} 一致 (信度: ${conf}%)`, 'match', timestamp);
                } else {
                    statusBar.innerText = "✗✗ 不一致 (NG)";
                    statusBar.style.backgroundColor = "#dc2626";
                    playSound('mismatch');
                    addLog(`✗ ${id} 不一致 → 正解: ${targetID} (信度: ${conf}%)`, 'mismatch', timestamp);
                }
            }
        }

        function playSound(type) {
            if (!soundEnabled) return;

            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            oscillator.connect(gain);
            gain.connect(audioContext.destination);

            if (type === 'register') {
                // 登録: 単音（800Hz, 300ms）
                oscillator.frequency.value = 800;
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            } else if (type === 'match') {
                // 一致: ツートーン（1200Hz, 1000Hz）
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                oscillator.frequency.setValueAtTime(1200, audioContext.currentTime);
                oscillator.frequency.setValueAtTime(1000, audioContext.currentTime + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            } else if (type === 'mismatch') {
                // 不一致: 低音ビープ（400Hz, 400ms）
                oscillator.frequency.value = 400;
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.4);
            }
        }

        function addLog(message, type, timestamp) {
            const entry = { message, type, timestamp };
            scanLog.push(entry);

            const logDiv = document.createElement('div');
            logDiv.className = `log-entry ${type}`;
            logDiv.innerText = `[${timestamp}] ${message}`;
            logList.insertBefore(logDiv, logList.firstChild);

            // 最大50件まで保持
            while (logList.children.length > 50) {
                logList.removeChild(logList.lastChild);
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            soundToggle.classList.toggle('active', soundEnabled);
            soundToggle.innerText = soundEnabled ? '🔊 ON' : '🔇 OFF';
        }

        function downloadLog() {
            const csv = [
                ['時刻', 'メッセージ', 'ステータス'],
                ...scanLog.map(log => [log.timestamp, `"${log.message}"`, log.type])
            ].map(row => row.join(',')).join('\n');

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `id-match-log-${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        function resetApp() {
            targetID = null;
            targetConf = 0;
            targetDisplay.innerText = "----------";
            targetConfidence.innerText = "信度: --";
            currentDisplay.innerText = "----------";
            currentConfidence.innerText = "信度: --";
            confidenceFill.style.width = '0%';
            statusBar.innerText = "1枚目をスキャン";
            statusBar.style.backgroundColor = "#1f2937";
            retryWarning.style.display = 'none';
            debugRaw.innerText = '---';
            debugDigits.innerText = '---';
            debugMatch.innerText = '---';
        }

        window.onload = init;
    </script>
</body>
</html>
